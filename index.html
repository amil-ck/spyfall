<script src="script.js"></script>

<link rel="stylesheet" href="style.css">

<form onsubmit="handleSubmit(event)">
    Choose Category:
    <div id="categorySelect">
        <div class="category-btn" onclick="selectCategory('locations')">Locations</div>
        <div class="category-btn" onclick="selectCategory('animals')">Animals</div>
        <div class="category-btn" onclick="selectCategory('countries')">Countries</div>
    </div>
    <input type="hidden" id="category" value="" />
    <br><br>

    Enter Player Number:
    <div id="playerSelect">
        <div class="player-btn" onclick="selectPlayer(1)">1</div>
        <div class="player-btn" onclick="selectPlayer(2)">2</div>
        <div class="player-btn" onclick="selectPlayer(3)">3</div>
        <div class="player-btn" onclick="selectPlayer(4)">4</div>
    </div>
    <input type="hidden" id="playerNumber" value="" />    

    <br>
    <br>

    Enter Seed:
    <input type="text" id="seed">

    <br>
    <br>

    <input type="submit">
</form>

<p id="output"></p>
